<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:800px;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#2c3e50;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#2980b9;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th,
table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

table th{
    background:#3498db;
    color:white;
}

.delete-btn{
    background:#e74c3c;
    padding:8px 12px;
    border:none;
    color:white;
    border-radius:4px;
    cursor:pointer;
}

.delete-btn:hover{
    background:#c0392b;
}
</style>
</head>

<body>

<div class="container">

    <h1>Student Management System</h1>

    <div class="form-group">
        <label>Student Name</label>
        <input type="text" id="name">
    </div>

    <div class="form-group">
        <label>Roll Number</label>
        <input type="number" id="roll">
    </div>

    <div class="form-group">
        <label>Course</label>
        <input type="text" id="course">
    </div>

    <button onclick="addStudent()">
        Add Student
    </button>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Roll Number</th>
                <th>Course</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="studentTable">

        </tbody>
    </table>

</div>

<script>

let students = [];

function addStudent(){

    let name = document.getElementById("name").value;
    let roll = document.getElementById("roll").value;
    let course = document.getElementById("course").value;

    if(name === "" || roll === "" || course === ""){
        alert("Please fill all fields");
        return;
    }

    let student = {
        name : name,
        roll : roll,
        course : course
    };

    students.push(student);

    displayStudents();

    document.getElementById("name").value = "";
    document.getElementById("roll").value = "";
    document.getElementById("course").value = "";
}

function displayStudents(){

    let table = document.getElementById("studentTable");

    table.innerHTML = "";

    for(let i=0;i<students.length;i++){

        table.innerHTML += `
        <tr>
            <td>${students[i].name}</td>
            <td>${students[i].roll}</td>
            <td>${students[i].course}</td>
            <td>
                <button
                    class="delete-btn"
                    onclick="deleteStudent(${i})">
                    Delete
                </button>
            </td>
        </tr>
        `;
    }
}

function deleteStudent(index){

    students.splice(index,1);

    displayStudents();
}

</script>

</body>
</html>
